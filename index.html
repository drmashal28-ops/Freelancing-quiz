let currentQuestion = 0;
let score = 0;
let marksObtained = 0;
let timeLeft = 50 * 60; // 50 minutes
let quizStarted = false;
let quizEnded = false;
const TOTAL_MARKS = 100;
const FREELANCING_MARKS = 50;
const SEO_MARKS = 30;
const FREELANCING_QUESTIONS = 50;
const SEO_QUESTIONS = 30;

let freelancingScore = 0;
let seoScore = 0;

const container = document.getElementById("container");

function getTimeUntilStart() {
    const now = new Date();
    const today = new Date();
    
    // Set target time to 9:30 PM (21:30)
    today.setHours(21, 30, 0, 0);
    
    // If 9:30 PM has already passed today, target tomorrow's 9:30 PM
    if (now > today) {
        today.setDate(today.getDate() + 1);
    }
    
    const timeUntilStart = today - now;
    return timeUntilStart;
}

function formatCountdown(ms) {
    const totalSeconds = Math.floor(ms / 1000);
    const hours = Math.floor(totalSeconds / 3600);
    const minutes = Math.floor((totalSeconds % 3600) / 60);
    const seconds = totalSeconds % 60;
    
    return `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
}

function showCountdown() {
    const timeUntilStart = getTimeUntilStart();
    
    if (timeUntilStart <= 0) {
        quizStarted = true;
        startQuiz();
        return;
    }
    
    container.innerHTML = `
        <div class="countdown-screen">
            <h1>🎯 Quiz Starts Soon</h1>
            <p class="countdown-message">Quiz will begin at <strong>9:30 PM</strong></p>
            <div class="countdown-timer" id="countdownTimer">${formatCountdown(timeUntilStart)}</div>
            <p style="font-size:18px; color:#64748b;">Get ready to test your knowledge!</p>
            <div class="quiz-info">
                <p><strong>📋 Quiz Details:</strong></p>
                <p>📌 Total Questions: 80</p>
                <p>🎯 Freelancing: 50 Questions (50 Marks)</p>
                <p>📝 Content Writing: 30 Questions (30 Marks)</p>
                <p>⏱️ Time Limit: 50 Minutes</p>
                <p>💯 Total Marks: 100</p>
                <p>✅ Passing Score: 60 Marks</p>
            </div>
        </div>
    `;
    
    const countdownInterval = setInterval(() => {
        const updatedTime = getTimeUntilStart();
        const timerEl = document.getElementById("countdownTimer");
        
        if (timerEl) {
            timerEl.textContent = formatCountdown(updatedTime);
        }
        
        if (updatedTime <= 0) {
            clearInterval(countdownInterval);
            quizStarted = true;
            startQuiz();
        }
    }, 1000);
}

function startQuiz() {
    loadQuizScreen();
    startTimer();
}

function startTimer(){
    const timerEl = document.getElementById("timer");
    
    const timer = setInterval(() => {

        let minutes = Math.floor(timeLeft / 60);
        let seconds = timeLeft % 60;

        seconds = seconds < 10 ? "0" + seconds : seconds;

        if(timerEl) {
            timerEl.textContent = `${minutes}:${seconds}`;
            
            // Add warning classes based on time left
            if(timeLeft <= 60) {
                timerEl.classList.remove('warning');
                timerEl.classList.add('danger');
            } else if(timeLeft <= 300) {
                timerEl.classList.remove('danger');
                timerEl.classList.add('warning');
            }
        }

        if(timeLeft <= 0){
            clearInterval(timer);
            quizEnded = true;
            showTimeUp();
        }

        timeLeft--;

    },1000);
}

function loadQuizScreen() {
    const current = quizData[currentQuestion];

    container.innerHTML = `
        <div>
            <div class="top-bar">
                <div class="progress" id="progress">Question ${currentQuestion + 1} / ${quizData.length}</div>
                <div class="timer" id="timer">50:00</div>
            </div>

            <div id="quiz-screen">
                <h1>Freelancing & SEO Content Writing Quiz</h1>

                <div class="question" id="question"></div>

                <div class="options" id="options"></div>

                <div class="explanation" id="explanation"></div>

                <button class="next-btn" id="nextBtn" disabled>Next Question</button>
            </div>
        </div>
    `;

    displayQuestion();
    setupNextButton();
}

function displayQuestion() {
    const current = quizData[currentQuestion];
    const questionEl = document.getElementById("question");
    const optionsEl = document.getElementById("options");
    const explanationEl = document.getElementById("explanation");
    const nextBtn = document.getElementById("nextBtn");

    questionEl.textContent = current.q;

    optionsEl.innerHTML = "";

    explanationEl.style.display = "none";
    explanationEl.textContent = "";

    nextBtn.disabled = true;

    current.options.forEach((option, index) => {
        const button = document.createElement("button");
        button.classList.add("option-btn");
        button.textContent = option;

        button.addEventListener("click", () => selectAnswer(button, index));

        optionsEl.appendChild(button);
    });
}

function selectAnswer(button, index) {
    const current = quizData[currentQuestion];
    const buttons = document.querySelectorAll(".option-btn");
    const explanationEl = document.getElementById("explanation");
    const nextBtn = document.getElementById("nextBtn");

    buttons.forEach(btn => {
        btn.disabled = true;
    });

    if(index === current.answer){
        button.classList.add("correct");
        score++;
        
        if(current.category === "freelancing") {
            freelancingScore++;
            marksObtained += 1;
        } else if(current.category === "seo") {
            seoScore++;
            marksObtained += (10/3);
        }
    }else{
        button.classList.add("wrong");
        buttons[current.answer].classList.add("correct");
    }

    explanationEl.style.display = "block";
    explanationEl.textContent = current.explanation;

    nextBtn.disabled = false;
}

function setupNextButton() {
    const nextBtn = document.getElementById("nextBtn");
    
    nextBtn.addEventListener("click", () => {
        currentQuestion++;

        if(currentQuestion < quizData.length){
            displayQuestion();
        }else{
            quizEnded = true;
            showResults();
        }
    });
}

function showResults() {
    const percentage = Math.round((score / quizData.length) * 100);
    const pass = marksObtained >= 60;

    container.innerHTML = `
        <div class="result-screen">
            <h2>Quiz Completed ✅</h2>

            <div class="score-box">
                <div class="marks-display">📊 ${marksObtained.toFixed(2)} / ${TOTAL_MARKS} Marks</div>
                <p>Questions Correct: ${score} / ${quizData.length}</p>
                <p>Percentage: ${percentage}%</p>
                <p class="${pass ? 'pass' : 'fail'}">
                    ${pass ? '🎉 PASS - Excellent Work!' : '📚 FAIL - Please Revise and Try Again'}
                </p>
                
                <div class="section-breakdown">
                    <p><strong>📊 Section-wise Breakdown:</strong></p>
                    <p>🎯 Freelancing: ${freelancingScore}/50 Questions (${(freelancingScore * 1).toFixed(2)}/50 Marks)</p>
                    <p>📝 Content Writing: ${seoScore}/30 Questions (${(seoScore * (10/3)).toFixed(2)}/30 Marks)</p>
                </div>
                
                <p style="margin-top:20px; font-size:18px; color:#64748b;">
                    ${pass ? 'Great job! You have passed the quiz.' : 'You need 60 marks to pass. Keep practicing!'}
                </p>
            </div>
        </div>
    `;
}

function showTimeUp() {
    const percentage = Math.round((score / quizData.length) * 100);
    const pass = marksObtained >= 60;

    container.innerHTML = `
        <div class="time-up">
            <h2>⏰ Time's Up!</h2>
            <p style="font-size:20px; color:#64748b; margin:20px 0;">Quiz has ended</p>

            <div class="score-box">
                <div class="marks-display">📊 ${marksObtained.toFixed(2)} / ${TOTAL_MARKS} Marks</div>
                <p>Questions Correct: ${score} / ${quizData.length}</p>
                <p>Percentage: ${percentage}%</p>
                <p class="${pass ? 'pass' : 'fail'}">
                    ${pass ? '🎉 PASS - Great Job!' : '📚 FAIL - Please Revise and Try Again'}
                </p>
                
                <div class="section-breakdown">
                    <p><strong>📊 Section-wise Breakdown:</strong></p>
                    <p>🎯 Freelancing: ${freelancingScore}/50 Questions (${(freelancingScore * 1).toFixed(2)}/50 Marks)</p>
                    <p>📝 Content Writing: ${seoScore}/30 Questions (${(seoScore * (10/3)).toFixed(2)}/30 Marks)</p>
                </div>
                
                <p style="margin-top:20px; font-size:18px; color:#64748b;">
                    ${pass ? 'Well done! You scored ' + marksObtained.toFixed(2) + ' marks.' : 'You scored ' + marksObtained.toFixed(2) + ' marks. Need 60 to pass.'}
                </p>
            </div>
        </div>
    `;
}

// Initialize the countdown
showCountdown();

</script>
